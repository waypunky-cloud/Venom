<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Venom Forum — Community</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --card-bg: #050505;
            --border: rgba(255, 255, 255, 0.03);
            --v-red: #8b0000;
            --text-main: #666;
            --text-accent: #eee;
        }

        body { 
            font-family: 'Montserrat', sans-serif; 
            background-color: var(--bg); 
            color: var(--text-main); 
            margin: 0; 
            background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0IiBoZWlnaHQ9IjQiIHZpZXdCb3g9IjAgMCA0IDQiPjxnIGZpbGwtcmVsZT0iZXZlbm9kZCI+PGcgZmlsbD0iIzFhMWExYSIgZmlsbC1vcGFjaXR5PSIwLjA3Ij48cGF0aCBkPSJNMCAwaDJ2Mkgwek0yIDJoMnYySDJ6Ii8+PC9nPjwvZz48L3N2Zz4=');
        }

        header { 
            padding: 15px 8%; display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 1px solid var(--border);
            background: rgba(0, 0, 0, 0.95);
        }

        .logo { font-family: 'Orbitron', sans-serif; font-size: 26px; color: #fff; text-decoration: none; font-weight: 900; letter-spacing: 3px; }
        .nav-back { text-decoration: none; color: #444; font-size: 11px; text-transform: uppercase; font-weight: 700; font-family: 'Orbitron'; }
        .nav-back:hover { color: #fff; }

        .container { max-width: 900px; margin: 40px auto; padding: 0 20px; }

        .forum-header { border-bottom: 1px solid var(--v-red); padding-bottom: 20px; margin-bottom: 40px; display: flex; justify-content: space-between; align-items: center;}
        .btn-create { background: #eee; color: #000; padding: 12px 24px; border-radius: 4px; text-decoration: none; font-weight: 700; font-size: 11px; text-transform: uppercase;}

        .topic-card {
            background: var(--card-bg); border: 1px solid var(--border);
            padding: 25px; margin-bottom: 15px; border-radius: 4px;
            display: flex; justify-content: space-between; align-items: center;
            transition: 0.3s; cursor: pointer;
        }
        .topic-card:hover { border-color: var(--v-red); transform: translateX(5px); }

        .topic-info h3 { margin: 0 0 8px 0; color: var(--text-accent); font-size: 18px; letter-spacing: 0.5px; }
        .topic-meta { font-size: 10px; color: #444; text-transform: uppercase; letter-spacing: 1px; }

        .topic-stats { text-align: right; font-family: 'Orbitron'; font-size: 12px; color: var(--v-red); font-weight: 900; }
        .topic-stats span { display: block; font-size: 8px; color: #333; }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">VENOM</a>
    <a href="index.html" class="nav-back">← Вернуться в магазины</a>
</header>

<div class="container">
    <div class="forum-header">
        <h1 style="color: #fff; font-size: 28px; margin: 0; font-family: 'Orbitron';">FORUM</h1>
        <a href="#" class="btn-create">Новая тема</a>
    </div>

    <div class="topic-card">
        <div class="topic-info">
            <h3>Правила безопасных сделок в системе</h3>
            <div class="topic-meta">Закреплено • Администрация</div>
        </div>
        <div class="topic-stats">INFO</div>
    </div>

    <div class="topic-card">
        <div class="topic-info">
            <h3>Обсуждение локаций: Тирасполь/Бендеры</h3>
            <div class="topic-meta">Автор: Shadow • 45 мин. назад</div>
        </div>
        <div class="topic-stats">142 <span>ответов</span></div>
    </div>

    <div class="topic-card">
        <div class="topic-info">
            <h3>RASTA SHOP — проверка качества 🌿</h3>
            <div class="topic-meta">Автор: User_291 • 3 часа назад</div>
        </div>
        <div class="topic-stats">86 <span>ответов</span></div>
    </div>
</div>

</body>
</html>
