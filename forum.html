<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Venom Forum — Сообщество</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030303;
            --card-bg: rgba(15, 15, 15, 0.9);
            --border: rgba(255, 255, 255, 0.08);
            --v-red: #b30000;
            --text-accent: #ffffff;
        }

        body { 
            font-family: 'Montserrat', sans-serif; 
            background: #000; color: #777; margin: 0; 
        }

        header { 
            padding: 20px 8%; display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 1px solid var(--border); background: #000;
        }

        .logo { font-family: 'Orbitron', sans-serif; font-size: 24px; color: #fff; text-decoration: none; font-weight: 900; letter-spacing: 4px; }
        .nav-back { text-decoration: none; color: #555; font-size: 11px; text-transform: uppercase; font-weight: 700; }

        .container { max-width: 1000px; margin: 60px auto; padding: 0 20px; }

        .forum-title { color: #fff; font-family: 'Orbitron'; font-size: 32px; margin-bottom: 40px; border-left: 4px solid var(--v-red); padding-left: 20px; }

        .topic-list { display: flex; flex-direction: column; gap: 15px; }

        .topic-card {
            background: var(--card-bg); border: 1px solid var(--border);
            padding: 25px; border-radius: 8px;
            display: flex; justify-content: space-between; align-items: center;
            transition: 0.3s; cursor: pointer;
        }
        .topic-card:hover { border-color: #444; background: #0a0a0a; }

        .topic-info h3 { margin: 0 0 10px 0; color: var(--text-accent); font-size: 18px; }
        .topic-meta { font-size: 11px; color: #444; text-transform: uppercase; }

        .stats { font-family: 'Orbitron'; color: var(--v-red); font-size: 14px; text-align: right; }
        .stats span { display: block; font-size: 9px; color: #333; margin-top: 5px; }

        .btn-new { background: #fff; color: #000; padding: 12px 25px; border-radius: 4px; text-decoration: none; font-weight: 700; font-size: 12px; transition: 0.3s;}
        .btn-new:hover { background: var(--v-red); color: #fff; }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">VENOM</a>
    <a href="index.html" class="nav-back">← Назад</a>
</header>

<div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px;">
        <div class="forum-title">COMMUNITY</div>
        <a href="#" class="btn-new">СОЗДАТЬ ТЕМУ</a>
    </div>

    <div class="topic-list">
        <div class="topic-card">
            <div class="topic-info">
                <h3>Общие правила безопасности сделок</h3>
                <div class="topic-meta">Admin • Важное</div>
            </div>
            <div class="stats">GUIDE</div>
        </div>

        <div class="topic-card">
            <div class="topic-info">
                <h3>Отзывы: Работа курьеров в Тирасполе</h3>
                <div class="topic-meta">User_01 • 15 мин назад</div>
            </div>
            <div class="stats">128 <span>сообщений</span></div>
        </div>
    </div>
</div>

</body>
</html>
